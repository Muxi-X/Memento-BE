name: deploy-test

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: cixing-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST }}
          TEST_SERVER_USERNAME: ${{ secrets.TEST_SERVER_USERNAME }}
          TEST_SERVER_SSH_KEY: ${{ secrets.TEST_SERVER_SSH_KEY }}
          TEST_CONFIG_YAML: ${{ secrets.TEST_CONFIG_YAML }}
          TEST_POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
        run: |
          set -eu
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          test -n "$TEST_SERVER_HOST"
          test -n "$TEST_SERVER_USERNAME"
          test -n "$TEST_SERVER_SSH_KEY"
          test -n "$TEST_CONFIG_YAML"
          test -n "$TEST_POSTGRES_PASSWORD"

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -eu
          echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -eu
          IMAGE_SHA="docker.io/${DOCKERHUB_USERNAME}/${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          IMAGE_LATEST="docker.io/${DOCKERHUB_USERNAME}/${IMAGE_REPOSITORY}:test-latest"
          docker build -f deploy/docker/Dockerfile.api -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "CIXING_IMAGE=$IMAGE_SHA" >> "$GITHUB_ENV"

      - name: Prepare deployment files
        env:
          TEST_CONFIG_YAML: ${{ secrets.TEST_CONFIG_YAML }}
          TEST_POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
        run: |
          set -eu
          mkdir -p /tmp/cixing-deploy
          cp deploy/compose/docker-compose.prod.yml /tmp/cixing-deploy/docker-compose.yml
          printf '%s' "$TEST_CONFIG_YAML" > /tmp/cixing-deploy/config.yaml
          {
            echo "CIXING_IMAGE=${CIXING_IMAGE}"
            echo "POSTGRES_PASSWORD=${TEST_POSTGRES_PASSWORD}"
            echo "API_PORT=8080"
            echo "MAILPIT_UI_PORT=8025"
          } > /tmp/cixing-deploy/deploy.env

      - name: Configure SSH
        env:
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST }}
          TEST_SERVER_SSH_KEY: ${{ secrets.TEST_SERVER_SSH_KEY }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "$TEST_SERVER_SSH_KEY" > ~/.ssh/id_test_server
          chmod 600 ~/.ssh/id_test_server
          ssh-keyscan -H "$TEST_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        env:
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST }}
          TEST_SERVER_USERNAME: ${{ secrets.TEST_SERVER_USERNAME }}
        run: |
          set -eu
          ssh -i ~/.ssh/id_test_server "$TEST_SERVER_USERNAME@$TEST_SERVER_HOST" \
            "sudo mkdir -p /opt/cixing/config && sudo chown -R $TEST_SERVER_USERNAME /opt/cixing"
          scp -i ~/.ssh/id_test_server /tmp/cixing-deploy/docker-compose.yml \
            "$TEST_SERVER_USERNAME@$TEST_SERVER_HOST:/opt/cixing/docker-compose.yml"
          scp -i ~/.ssh/id_test_server /tmp/cixing-deploy/deploy.env \
            "$TEST_SERVER_USERNAME@$TEST_SERVER_HOST:/opt/cixing/deploy.env"
          scp -i ~/.ssh/id_test_server /tmp/cixing-deploy/config.yaml \
            "$TEST_SERVER_USERNAME@$TEST_SERVER_HOST:/opt/cixing/config/config.yaml"

      - name: Deploy on ECS
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST }}
          TEST_SERVER_USERNAME: ${{ secrets.TEST_SERVER_USERNAME }}
        run: |
          set -eu
          echo "$DOCKERHUB_TOKEN" | ssh -i ~/.ssh/id_test_server "$TEST_SERVER_USERNAME@$TEST_SERVER_HOST" \
            "if docker info >/dev/null 2>&1; then docker login docker.io -u '$DOCKERHUB_USERNAME' --password-stdin; else sudo docker login docker.io -u '$DOCKERHUB_USERNAME' --password-stdin; fi"
          ssh -i ~/.ssh/id_test_server "$TEST_SERVER_USERNAME@$TEST_SERVER_HOST" <<'REMOTE'
            set -eu
            cd /opt/cixing
            DOCKER="docker"
            if ! docker info >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi
            chmod 600 /opt/cixing/deploy.env /opt/cixing/config/config.yaml
            $DOCKER compose --env-file /opt/cixing/deploy.env -f /opt/cixing/docker-compose.yml pull
            $DOCKER compose --env-file /opt/cixing/deploy.env -f /opt/cixing/docker-compose.yml up -d postgres redis mailpit
            $DOCKER compose --env-file /opt/cixing/deploy.env -f /opt/cixing/docker-compose.yml run --rm migrate up
            $DOCKER compose --env-file /opt/cixing/deploy.env -f /opt/cixing/docker-compose.yml up -d api
            $DOCKER compose --env-file /opt/cixing/deploy.env -f /opt/cixing/docker-compose.yml ps
            $DOCKER compose --env-file /opt/cixing/deploy.env -f /opt/cixing/docker-compose.yml logs --tail=80 api
          REMOTE
