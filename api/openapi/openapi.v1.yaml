  /v1/uploads/publish-sessions/{session_id}/assets/complete-batch:
    post:
      tags: [UploadSessions]
      operationId: completeUploadPublishSessionAssetsBatch
      description: >
        Complete the batch after direct uploads succeed. This request submits
        final per-image metadata in one shot, including display_order,
        optional is_cover, optional title/note, and optional audio metadata.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestId"
