name: cixing-prod

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: cixing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - cixing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cixing"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cixing_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.29.7}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"

  migrate:
    image: ${CIXING_IMAGE:?CIXING_IMAGE is required}
    restart: "no"
    entrypoint: ["/app/cixing-migrate"]
    command: ["up"]
    environment:
      CONFIG_FILE: /app/config/config.yaml
    volumes:
      - /opt/cixing/config/config.yaml:/app/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ${CIXING_IMAGE:?CIXING_IMAGE is required}
    restart: unless-stopped
    environment:
      CONFIG_FILE: /app/config/config.yaml
    volumes:
      - /opt/cixing/config/config.yaml:/app/config/config.yaml:ro
    ports:
      # Keep a local debug port, but prefer exposing only via Nginx (80/443).
      - "127.0.0.1:${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 3s
      retries: 12

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    environment:
      # Used by the entrypoint script to generate Nginx config.
      DOMAIN: ${DOMAIN:-cixing.duckdns.org}
      UPSTREAM: ${NGINX_UPSTREAM:-api:8080}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
      - /opt/cixing/nginx/entrypoint/99-gen-conf.sh:/docker-entrypoint.d/99-gen-conf.sh:ro
    depends_on:
      api:
        condition: service_healthy

  certbot:
    image: ${CERTBOT_IMAGE:-certbot/certbot:v2.11.0}
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    # Renew twice per day. Nginx reload after renewal is not automatic; reload on host when needed.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 12h
        done
    depends_on:
      - nginx

volumes:
  cixing_pgdata:
  cixing_redis:
  certbot_www:
  letsencrypt:
