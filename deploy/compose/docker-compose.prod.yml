name: cixing-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cixing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - cixing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cixing"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cixing_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"

  migrate:
    image: ${CIXING_IMAGE:?CIXING_IMAGE is required}
    restart: "no"
    entrypoint: ["/app/cixing-migrate"]
    command: ["up"]
    environment:
      CONFIG_FILE: /app/config/config.yaml
    volumes:
      - /opt/cixing/config/config.yaml:/app/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ${CIXING_IMAGE:?CIXING_IMAGE is required}
    restart: unless-stopped
    environment:
      CONFIG_FILE: /app/config/config.yaml
    volumes:
      - /opt/cixing/config/config.yaml:/app/config/config.yaml:ro
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  cixing_pgdata:
  cixing_redis:

