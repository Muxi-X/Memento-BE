name: cixing-test

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cixing_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cixing_test"]
      interval: 2s
      timeout: 3s
      retries: 20
